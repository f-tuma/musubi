packages:
  - 'apps/*'
  - 'packages/*'
# Expo/React Native tooling assumes a flat node_modules (config plugins, Metro).
# pnpm's default isolated layout hides transitive deps like @expo/config-plugins.
nodeLinker: hoisted
allowBuilds:
  esbuild: false
  msgpackr-extract: true
  sharp: false
  unrs-resolver: false
overrides:
  esbuild@<=0.24.2: '>=0.25.0'
  postcss@<8.5.10: '>=8.5.10'
minimumReleaseAgeExclude:
  - '@expo/cli@56.1.19'
  - '@expo/config-plugins@56.0.12'
  - '@expo/fingerprint@0.19.7'
  - '@expo/prebuild-config@56.0.19'
  - '@expo/router-server@56.0.16'
  - babel-preset-expo@56.0.17
  - expo-asset@56.0.19
  - expo-modules-autolinking@56.0.19
  - expo-modules-core@56.0.20
  - expo-modules-jsi@56.0.12
  - expo@56.0.15
  - '@expo/ui@56.0.21'
  - expo-build-properties@56.0.22
  - expo-image-manipulator@56.0.21
  - expo-image-picker@56.0.20
  - expo-notifications@56.0.20
  - expo-router@56.2.14
